name: Job Scraper

on:
  schedule:
    # 월/수/금 오전 9시 KST (UTC 00:00)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:
    inputs:
      source:
        description: '수집할 플랫폼 (all / saramin / wanted / jumpit / programmers / jobkorea)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry-run 모드 (Notion 미기록)'
        type: boolean
        required: false
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: 의존성 설치
        run: pip install -r scraper/requirements.txt

      - name: 채용공고 수집 실행
        working-directory: scraper
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY_RUN" = "true" ]; then
            python main.py --source "$SOURCE" --dry-run
          else
            python main.py --source "$SOURCE"
          fi
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
